
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALK ia | Conexões Neurais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --talk-bg: #121212;
            --talk-card: #18181b;
            --talk-red: #dc2626;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--talk-bg);
            color: white;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .cai-card {
            background-color: var(--talk-card);
            border-radius: 2rem;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }
        .cai-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(220, 38, 38, 0.4);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5), 0 0 20px -5px rgba(220, 38, 38, 0.2);
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .animate-slideInRight { animation: slideInRight 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        input::placeholder {
            color: #3f3f46;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 10px;
        }
    </style>
<script type="importmap">
{

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
